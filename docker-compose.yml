services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/backend
    env_file:
      - ./backend/.env
    working_dir: /var/www/backend
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - northwind

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    networks:
      - northwind
    depends_on:
      - backend

networks:
  northwind:
    driver: bridge
