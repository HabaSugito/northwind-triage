services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/app
    env_file:
      - ./.env
    working_dir: /var/www/app
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - northwind

  vite:
    image: node:18-alpine
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    working_dir: /app
    command: npm run dev
    networks:
      - northwind

networks:
  northwind:
    driver: bridge
