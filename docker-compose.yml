services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/app
    env_file:
      - ./.env
    working_dir: /var/www/app
    command: sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - northwind

  vite:
    image: node:22-alpine
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - vite_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    networks:
      - northwind

networks:
  northwind:
    driver: bridge

volumes:
  vite_node_modules:
